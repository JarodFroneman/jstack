      <g transform="translate(22 70)" fill="#CBD5E1" font-size="11" font-weight="600">
        <circle cx="7" cy="7" r="7" fill="#12392F" stroke="#34D399" stroke-opacity="0.5"/>
        <path d="M3.5 7L6 9.5L10.5 4.5" fill="none" stroke="#6EE7B7" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="22" y="11">QA receipts</text>
        <circle cx="137" cy="7" r="7" fill="#12392F" stroke="#34D399" stroke-opacity="0.5"/>
        <path d="M133.5 7L136 9.5L140.5 4.5" fill="none" stroke="#6EE7B7" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="152" y="11">Security coverage</text>
        <circle cx="7" cy="38" r="7" fill="#12392F" stroke="#34D399" stroke-opacity="0.5"/>
        <path d="M3.5 38L6 40.5L10.5 35.5" fill="none" stroke="#6EE7B7" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="22" y="42">Human gates</text>
        <circle cx="137" cy="38" r="7" fill="#12392F" stroke="#34D399" stroke-opacity="0.5"/>
        <path d="M133.5 38L136 40.5L140.5 35.5" fill="none" stroke="#6EE7B7" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="152" y="42">Release readiness</text>
